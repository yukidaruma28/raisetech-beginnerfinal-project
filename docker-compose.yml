services:
  mysql:
    image: mysql:8.0
    container_name: inquiry_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: inquiry_tracker
      MYSQL_USER: inquiry
      MYSQL_PASSWORD: inquirypass
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=caching_sha2_password

volumes:
  mysql_data:
