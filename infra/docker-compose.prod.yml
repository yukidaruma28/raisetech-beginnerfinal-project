services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - /opt/kanban-linear/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nuxt
      - backend
    restart: unless-stopped

  nuxt:
    image: ${ECR_FRONTEND_URL}:latest
    expose:
      - "3000"
    environment:
      # SSR 時にバックエンドコンテナへ直接アクセス
      API_BASE_URL: http://backend:80
      # クライアント側は空文字（nginx 経由の同一オリジン相対パス）
      NUXT_PUBLIC_API_BASE_URL: ""
    restart: unless-stopped

  backend:
    image: ${ECR_BACKEND_URL}:latest
    expose:
      - "80"
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DB_HOST: ${DB_HOST}
      DB_PORT: "3306"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      ALLOWED_ORIGINS: http://${EC2_IP}:8080
      SOLID_QUEUE_IN_PUMA: "true"
    restart: unless-stopped
